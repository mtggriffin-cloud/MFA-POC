<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智能文件掃描相機</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }

        /* 相機畫面容器 */
        #camera-container { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* 輔助對齊遮罩 */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; align-items: center; padding: 40px 20px; }
        
        .tip-text { color: #fff; background: rgba(0,0,0,0.6); padding: 8px 16px; border-radius: 20px; font-size: 14px; letter-spacing: 1px; }

        /* 文件對準框 (A4 比例約 1:1.414) */
        .scan-box { width: 85%; height: 60%; border: 2px solid #00ffcc; box-shadow: 0 0 0 4000px rgba(0, 0, 0, 0.5); border-radius: 8px; position: relative; }
        /* 四個角落的瞄準線 */
        .scan-box::before, .scan-box::after { content: ''; position: absolute; width: 20px; height: 20px; border-color: #00ffcc; border-style: solid; }
        .scan-box::before { top: -2px; left: -2px; border-width: 4px 0 0 4px; }
        .scan-box::after { bottom: -2px; right: -2px; border-width: 0 4px 4px 0; }

        /* 拍照按鈕區 */
        .controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; align-items: center; z-index: 10; }
        .capture-btn { width: 70px; height: 70px; background: #fff; border-radius: 50%; border: 5px solid rgba(255,255,255,0.4); cursor: pointer; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .capture-btn:active { transform: scale(0.95); background: #ddd; }

        /* 預覽結果 */
        #preview-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; z-index: 20; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #preview-img { max-width: 100%; max-height: 75%; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .preview-buttons { margin-top: 20px; display: flex; gap: 20px; }
        .btn { padding: 12px 24px; border: none; border-radius: 25px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-retry { background: #444; color: #fff; }
        .btn-confirm { background: #00ffcc; color: #000; }
    </style>
</head>
<body>

    <!-- 1. 相機掃描介面 -->
    <div id="camera-container">
        <video id="video" autoplay playsinline></video>
        
        <!-- UI 疊加對齊框 -->
        <div class="overlay">
            <div class="tip-text">請將文件對正框內拍攝</div>
            <div class="scan-box"></div>
            <div></div> <!-- 佔位平衡佈局 -->
        </div>

        <!-- 拍照控制鍵 -->
        <div class="controls">
            <button class="capture-btn" id="capture-btn"></button>
        </div>
    </div>

    <!-- 2. 拍照後預覽與確認介面 -->
    <div id="preview-container">
        <h3 style="color: white; margin-bottom: 15px;">檢查文件清晰度</h3>
        <img id="preview-img" src="" alt="預覽畫面">
        <div class="preview-buttons">
            <button class="btn btn-retry" id="retry-btn">重新拍攝</button>
            <button class="btn btn-confirm" id="confirm-btn">確認使用</button>
        </div>
    </div>

    <!-- 隱藏的 Canvas 用於處理圖片裁切與捕捉 -->
    <canvas id="canvas" style="display: none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const captureBtn = document.getElementById('capture-btn');
        const previewContainer = document.getElementById('preview-container');
        const previewImg = document.getElementById('preview-img');
        const retryBtn = document.getElementById('retry-btn');
        const confirmBtn = document.getElementById('confirm-btn');

        // 1. 啟動手機後置相機
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: "environment", // 強制後置鏡頭
                        width: { ideal: 1920 },    // 爭取高解析度以提升準確度
                        height: { ideal: 1080 }
                    },
                    audio: false
                });
                video.srcObject = stream;
            } catch (err) {
                alert("無法開啟相機，請檢查瀏覽器權限設置（需 HTTPS 環境）。");
                console.error(err);
            }
        }

        // 2. 拍照捕捉
        captureBtn.addEventListener('click', () => {
            const ctx = canvas.getContext('2d');
            // 設定 canvas 尺寸與實際視訊流一致
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            // 將視訊畫面繪製到 canvas
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // 轉成 Base64 圖片格式用於預覽
            const imageData = canvas.toDataURL('image/jpeg', 0.9); // 0.9 為品質
            
            // 顯示預覽畫面
            previewImg.src = imageData;
            previewContainer.style.display = 'flex';
        });

        // 3. 重新拍攝
        retryBtn.addEventListener('click', () => {
            previewContainer.style.display = 'none';
            previewImg.src = '';
        });

        // 4. 確認送出 (此處可對接後端 API 或 OCR 服務)
        confirmBtn.addEventListener('click', () => {
            const base64Data = previewImg.src;
            alert("圖片已成功捕捉！可以準備上傳傳送或進行 OCR 辨識。");
            // window.fetch('/api/upload', { method: 'POST', body: JSON.stringify({ image: base64Data }) });
        });

        // 初始化
        window.addEventListener('DOMContentLoaded', initCamera);
    </script>
</body>
</html>
