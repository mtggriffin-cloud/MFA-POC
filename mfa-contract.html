<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXA iShop - 身份驗證</title>
</head>
<body>
    <div id="identity">
        <div class="topNav">
            <div class="back-btn">
                <i class="el-icon-arrow-left"></i>
            </div>
        </div>
        
        <div class="logo-section">
            <div class="security-icon">🔒</div>
            <h1 class="page-title">身份驗證</h1>
        </div>

        <div class="white-line"></div>

        <div class="mfa-container">
            <!-- <div class="mfa-label">多步驟安全驗證</div>
            
            <div>
                <p class="info-text">我們將發送驗證碼到你的已登記電話號碼。</p>
                <p class="info-text">請輸入收到的驗證碼以完成身份驗證。</p>
            </div> -->

            <div id="api"></div>

            <div class="mfa-footer">
                <p>我們將透過短訊發送驗證碼。如有問題，請聯絡客服部門。</p>
            </div>
        </div>
    </div>

    <style>
        html, body {
            padding: 0;
            margin: 0;
            font-family: NotoSansTC, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
        }

        #identity {
            background: #067089;
            min-height: -webkit-fill-available;
            min-height: 100%;
            padding: 0 1.5rem;
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: #ffffff;
        }

        .topNav {
            display: flex;
            position: relative;
            height: 3rem;
            align-items: center;
        }

        .back-btn {
            position: absolute;
            left: 0;
            top: 1rem;
            cursor: pointer;
            font-size: 1.5rem;
            font-weight: 600;
            color: #fff;
        }

        .logo-section {
            text-align: center;
            margin: 2rem 0 0 0;
            padding-top: 1rem;
        }

        .security-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .page-title {
            height: 2.188rem;
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 1.33px;
            text-align: center;
            color: #ffffff;
            margin: 0;
            padding: 0;
        }

        .white-line {
            width: 50%;
            margin: 1.5rem auto;
            border-bottom: solid 3px #ffffff;
        }

        .mfa-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding-bottom: 40px;
        }

        .mfa-label {
            height: 2rem;
            font-size: 1rem;
            font-weight: bold;
            letter-spacing: 0.5px;
            text-align: center;
            color: #ffffff;
            margin-bottom: 1.5rem;
        }

        .info-section {
            background-color: #056270;
            border-radius: 12px;
            padding: 1rem 1.25rem;
            margin-bottom: 2rem;
        }

        .info-text {
            font-size: 1rem;
            font-weight: 500;
            line-height: 1.5;
            color: #ffffff;
            margin: 0.5rem 0;
        }

        .info-text:first-child {
            margin-top: 0;
        }

        .info-text:last-child {
            margin-bottom: 0;
        }

        #api {
            font-size: 1rem;
            font-weight: 500;
            line-height: 1.5;
            color: #ffffff;
            margin-bottom: 2rem;
        }

        .mfa-footer {
            text-align: center;
            font-size: 0.75rem;
            line-height: 1.5;
            color: rgba(255, 255, 255, 0.8);
            padding: 1rem 0;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            margin-top: auto;
        }

        .mfa-footer > p {
            margin: 0;
            padding: 0;
        }

        /* Ensure input fields match login.html style */
        input[type="text"],
        input[type="password"],
        input[type="tel"],
        input[type="email"],
        select,
        textarea {
            background-color: #056270;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            padding: 0.75rem 1rem;
            font-family: inherit;
            font-size: 1rem;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 0.5rem;
        }

        input::placeholder,
        textarea::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            background-color: #065a71;
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.2);
        }

        /* Button styling to match login.html */
        button {
            background: #ff7781;
            border: none;
            border-radius: 20px;
            box-shadow: 1px 1px 10px 0 rgba(0, 0, 0, 0.1), 0 2px 2px 0 rgba(0, 0, 0, 0.2);
            font-family: NotoSansTC, inherit;
            font-size: 1rem;
            font-weight: bold;
            letter-spacing: 0.5px;
            text-align: center;
            color: #ffffff;
            width: 320px;
            min-width: 280px;
            height: 3rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0 2rem;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #ff6470;
        }

        button:active {
            background-color: #ff5560;
        }

        /* Responsive design */
        @media (max-width: 768px) {
            #identity {
                padding: 0 1rem;
            }

            .page-title {
                font-size: 1.25rem;
            }

            .mfa-label {
                font-size: 0.9rem;
            }

            .white-line {
                width: 60%;
            }
        }

        @media (max-width: 480px) {
            .logo-section {
                margin: 1rem 0 0 0;
                padding-top: 0.5rem;
            }

            .security-icon {
                font-size: 2rem;
            }

            .page-title {
                font-size: 1.25rem;
                height: auto;
            }

            .white-line {
                width: 70%;
                margin: 1rem auto;
            }

            .mfa-container {
                padding-bottom: 20px;
            }

            .info-section {
                padding: 0.75rem 1rem;
                margin-bottom: 1.5rem;
            }

            .info-text {
                font-size: 0.85rem;
            }
        }

        /* Accessibility */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation: none !important;
                transition: none !important;
            }
        }

        /* 6-box OTP input */
        .otp-boxes {
            display: flex;
            flex-wrap: nowrap;
            gap: 0.625rem;
            justify-content: center;
            align-items: center;
            overflow-x: auto;
            margin-bottom: 1.5rem;
        }

        .otp-boxes .otp-box {
            flex: 0 0 auto;
            width: 2.75rem;
            min-width: 2.75rem;
            height: 3.25rem;
            background-color: #056270;
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 10px;
            color: #ffffff;
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
            caret-color: #ffffff;
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .otp-box:focus {
            outline: none;
            border-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.25);
            background-color: #065a71;
        }

        .otp-box.filled {
            border-color: rgba(255, 255, 255, 0.8);
        }

        @media (max-width: 480px) {
            .otp-boxes {
                gap: 0.4rem;
            }

            .otp-boxes .otp-box {
                width: 2.2rem;
                min-width: 2.2rem;
                height: 2.8rem;
                font-size: 1.25rem;
            }
        }
    </style>

    <script>
        (function () {
            function ensureVerificationInput(codeVerification) {
                if (!codeVerification) {
                    return null;
                }

                var input = document.getElementById('verificationCode');
                if (input) {
                    return input;
                }

                // Fallback for delayed or missing dynamic markup.
                input = document.createElement('input');
                input.type = 'text';
                input.setAttribute('role', 'textbox');
                input.id = 'verificationCode';
                input.maxLength = 6;
                input.setAttribute('autocomplete', 'false');
                input.setAttribute('pattern', '\\d{6}');
                input.setAttribute('aria-hidden', 'false');
                input.style.display = 'block';
                codeVerification.appendChild(input);
                return input;
            }

            function initOtpBoxes() {
                var codeVerification = document.getElementById('codeVerification');
                var realInput = ensureVerificationInput(codeVerification);

                if (!realInput || !codeVerification || realInput.dataset.otpInit === '1') {
                    return;
                }

                realInput.dataset.otpInit = '1';

                // Keep original input for built-in verification logic but visually hide it.
                realInput.style.position = 'absolute';
                realInput.style.left = '-9999px';
                realInput.style.opacity = '0';
                realInput.style.width = '1px';
                realInput.style.height = '1px';
                realInput.style.pointerEvents = 'none';

                var wrapper = document.createElement('div');
                wrapper.className = 'otp-boxes';

                var boxes = [];
                for (var i = 0; i < 6; i++) {
                    var box = document.createElement('input');
                    box.type = 'text';
                    box.maxLength = 1;
                    box.inputMode = 'numeric';
                    box.pattern = '[0-9]';
                    box.autocomplete = 'off';
                    box.className = 'otp-box';
                    box.setAttribute('aria-label', 'OTP digit ' + (i + 1));
                    boxes.push(box);
                    wrapper.appendChild(box);
                }

                codeVerification.insertBefore(wrapper, realInput);

                function updateVerifyState() {
                    var verifyBtn = document.getElementById('verifyCode');
                    if (!verifyBtn) {
                        return;
                    }

                    var ready = realInput.value.length === 6;
                    verifyBtn.setAttribute('aria-disabled', ready ? 'false' : 'true');
                    if (ready) {
                        verifyBtn.classList.remove('disabled');
                    } else {
                        verifyBtn.classList.add('disabled');
                    }
                }

                function notifyPlatformOtpValidation(previousValue) {
                    var jq = window.jQuery || window.$;
                    if (!jq) {
                        return;
                    }

                    var currentValue = realInput.value || '';
                    var prevValue = previousValue || '';
                    var keyCode = currentValue.length < prevValue.length ? 8 : 48;

                    // Azure's built-in handler enables verify on keyup/paste for #verificationCode.
                    jq(realInput).trigger(jq.Event('keyup', { which: keyCode, keyCode: keyCode }));
                }

                function syncToReal() {
                    var previousValue = realInput.value || '';
                    realInput.value = boxes.map(function (b) { return b.value; }).join('');
                    realInput.dispatchEvent(new Event('input', { bubbles: true }));
                    notifyPlatformOtpValidation(previousValue);
                    updateVerifyState();
                }

                boxes.forEach(function (box, idx) {
                    box.addEventListener('input', function () {
                        var val = box.value.replace(/\D/g, '');

                        if (val.length > 1) {
                            var arr = val.slice(0, 6).split('');
                            for (var j = 0; j < 6; j++) {
                                var ch = arr[j] || '';
                                boxes[j].value = ch;
                                boxes[j].classList.toggle('filled', ch !== '');
                            }
                            var next = boxes.findIndex(function (b) { return b.value === ''; });
                            (boxes[next] || boxes[5]).focus();
                            syncToReal();
                            return;
                        }

                        box.value = val;
                        box.classList.toggle('filled', val !== '');
                        syncToReal();

                        if (val && idx < 5) {
                            boxes[idx + 1].focus();
                        }
                    });

                    box.addEventListener('keydown', function (e) {
                        if (e.key === 'Backspace') {
                            if (!box.value && idx > 0) {
                                boxes[idx - 1].value = '';
                                boxes[idx - 1].classList.remove('filled');
                                boxes[idx - 1].focus();
                            } else {
                                box.value = '';
                                box.classList.remove('filled');
                            }
                            syncToReal();
                            e.preventDefault();
                        } else if (e.key === 'ArrowLeft' && idx > 0) {
                            boxes[idx - 1].focus();
                        } else if (e.key === 'ArrowRight' && idx < 5) {
                            boxes[idx + 1].focus();
                        }
                    });

                    box.addEventListener('paste', function (e) {
                        e.preventDefault();
                        var pasted = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '');
                        var arr = pasted.slice(0, 6).split('');
                        for (var j = 0; j < 6; j++) {
                            var ch = arr[j] || '';
                            boxes[j].value = ch;
                            boxes[j].classList.toggle('filled', ch !== '');
                        }
                        var next = boxes.findIndex(function (b) { return b.value === ''; });
                        (boxes[next] || boxes[5]).focus();
                        syncToReal();
                    });
                });

                // Keep custom boxes in sync if platform script clears the original field.
                realInput.addEventListener('input', function () {
                    var clean = (realInput.value || '').replace(/\D/g, '').slice(0, 6);
                    for (var i = 0; i < 6; i++) {
                        var ch = clean[i] || '';
                        boxes[i].value = ch;
                        boxes[i].classList.toggle('filled', ch !== '');
                    }
                    updateVerifyState();
                });

                updateVerifyState();
                boxes[0].focus();
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initOtpBoxes);
            } else {
                initOtpBoxes();
            }

            var apiRoot = document.getElementById('api');
            if (apiRoot) {
                var observer = new MutationObserver(function () {
                    initOtpBoxes();
                });
                observer.observe(apiRoot, { childList: true, subtree: true });
            }
        })();
    </script>
</body>
</html>
